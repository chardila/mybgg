<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — My Board Games</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a2e;
      color: #fff;
      flex-shrink: 0;
    }

    header a { color: #aac; text-decoration: none; font-size: 14px; }
    header a:hover { color: #fff; }
    header h1 { font-size: 18px; font-weight: 600; }

    .lang-toggle { display: flex; gap: 4px; }
    .lang-toggle button {
      background: transparent;
      border: 1px solid #555;
      color: #aac;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .lang-toggle button.active {
      background: #4a4a8a;
      border-color: #4a4a8a;
      color: #fff;
    }

    .mode-bar {
      padding: 8px 16px;
      background: #e8e8f0;
      font-size: 13px;
      color: #555;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 15px;
    }
    .message.user {
      align-self: flex-end;
      background: #4a4a8a;
      color: #fff;
    }
    .message.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #ddd;
    }
    .message.error {
      align-self: flex-start;
      background: #fee;
      border: 1px solid #fcc;
      color: #900;
    }

    .message h1, .message h2, .message h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      margin-top: 8px;
    }
    .message ul { padding-left: 20px; margin: 4px 0; }
    .message li { margin: 2px 0; }
    .message code {
      background: #f0f0f0;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 13px;
    }
    .message.user code { background: rgba(255,255,255,0.2); }

    .cursor { display: inline-block; animation: blink 0.8s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .game-selector-bar {
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .game-selector-bar label { font-size: 13px; color: #555; white-space: nowrap; }
    .game-selector-bar select {
      flex: 1;
      min-width: 150px;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    #btn-reset-discovery {
      background: none;
      border: none;
      color: #4a4a8a;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      white-space: nowrap;
    }

    .input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
    }
    #message-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      resize: none;
      height: 42px;
      font-family: inherit;
    }
    #message-input:focus { outline: none; border-color: #4a4a8a; }
    #send-btn {
      padding: 8px 18px;
      background: #4a4a8a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <a href="/">← Mi colección</a>
  <h1>Chat</h1>
  <div class="lang-toggle">
    <button id="btn-es" class="active" onclick="setLanguage('es')">ES</button>
    <button id="btn-en" onclick="setLanguage('en')">EN</button>
  </div>
</header>

<div class="mode-bar" id="mode-bar">Modo: Descubrimiento de juego</div>

<div class="chat-container" id="chat-container"></div>

<div class="game-selector-bar">
  <label for="game-select">Juego de la noche:</label>
  <select id="game-select">
    <option value="">Seleccionar juego</option>
  </select>
  <button id="btn-reset-discovery" style="display:none" onclick="resetToDiscovery()">
    Volver a descubrimiento
  </button>
</div>

<div class="input-bar">
  <textarea
    id="message-input"
    placeholder="Escribe una pregunta..."
    rows="1"
  ></textarea>
  <button id="send-btn">Enviar</button>
</div>

<script>
  const WORKER_URL = ''; // empty = same origin (production via Cloudflare route)

  // ── State ──────────────────────────────────────────────────────────────────
  let currentLanguage = 'es';
  let currentMode = 'discovery';
  let currentGame = null;
  let currentGameName = null;
  let history = [];
  let streaming = false;

  // ── Language toggle ────────────────────────────────────────────────────────
  function setLanguage(lang) {
    currentLanguage = lang;
    document.getElementById('btn-es').classList.toggle('active', lang === 'es');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  }

  // ── Markdown renderer ──────────────────────────────────────────────────────
  function renderMarkdown(text) {
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/((?:<li>[^\n]*\n?)+)/g, '<ul>$1</ul>');
    html = html.replace(/\n\n+/g, '</p><p>');
    html = '<p>' + html + '</p>';
    html = html.replace(/<p>(<[hul])/g, '$1');
    html = html.replace(/(<\/[hul][^>]*>)<\/p>/g, '$1');
    html = html.replace(/<p><\/p>/g, '');
    return html;
  }

  // ── Chat DOM helpers ───────────────────────────────────────────────────────
  function addMessage(role, htmlContent) {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = htmlContent;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function addStreamingMessage() {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.innerHTML = '<span class="cursor">▋</span>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  // ── Load games into selector ───────────────────────────────────────────────
  async function loadGames() {
    try {
      const res = await fetch(`${WORKER_URL}/api/games`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const games = await res.json();
      const select = document.getElementById('game-select');
      games.forEach((g) => {
        const opt = document.createElement('option');
        opt.value = g.slug;
        opt.textContent = g.name;
        select.appendChild(opt);
      });
      return games.length;
    } catch (e) {
      addMessage('error', 'No se pudo cargar la lista de juegos.');
      document.getElementById('game-select').disabled = true;
      return 0;
    }
  }

  // ── SSE chat request ───────────────────────────────────────────────────────
  async function sendMessage(userText) {
    if (streaming || !userText.trim()) return;

    streaming = true;
    document.getElementById('send-btn').disabled = true;
    document.getElementById('message-input').disabled = true;

    addMessage('user', userText.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'));

    const streamDiv = addStreamingMessage();
    let fullText = '';

    try {
      const res = await fetch(`${WORKER_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: userText,
          history,
          mode: currentMode,
          game: currentGame,
          language: currentLanguage,
        }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') {
            streamDiv.innerHTML = renderMarkdown(fullText);
            history.push({ role: 'user', content: userText });
            history.push({ role: 'assistant', content: fullText });
            break;
          }
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) {
              streamDiv.className = 'message error';
              streamDiv.innerHTML = parsed.error;
              break;
            }
            if (parsed.token) {
              fullText += parsed.token;
              streamDiv.innerHTML = renderMarkdown(fullText) + '<span class="cursor">▋</span>';
              document.getElementById('chat-container').scrollTop =
                document.getElementById('chat-container').scrollHeight;
            }
          } catch {}
        }
      }
    } catch (e) {
      streamDiv.className = 'message error';
      streamDiv.innerHTML = 'Error al conectar con el asistente. Intenta de nuevo.';
    }

    streaming = false;
    document.getElementById('send-btn').disabled = false;
    const input = document.getElementById('message-input');
    input.disabled = false;
    input.focus();
  }

  // ── Game night selection ───────────────────────────────────────────────────
  document.getElementById('game-select').addEventListener('change', function () {
    const slug = this.value;
    if (!slug) return;

    const name = this.options[this.selectedIndex].textContent;
    currentMode = 'deep_dive';
    currentGame = slug;
    currentGameName = name;
    history = [];

    document.getElementById('mode-bar').textContent = `Modo: ${name}`;
    document.getElementById('btn-reset-discovery').style.display = 'inline';
    document.getElementById('chat-container').innerHTML = '';

    const openingEs = `Listo para responder preguntas sobre ${name}. Tengo acceso a las reglas, setup y guía de enseñanza. ¿Qué necesitas saber?`;
    const openingEn = `Ready to answer questions about ${name}. I have access to the rules, setup, and teaching guide. What do you need to know?`;
    addMessage('assistant', currentLanguage === 'en' ? openingEn : openingEs);
  });

  function resetToDiscovery() {
    currentMode = 'discovery';
    currentGame = null;
    currentGameName = null;
    history = [];
    document.getElementById('game-select').value = '';
    document.getElementById('mode-bar').textContent = 'Modo: Descubrimiento de juego';
    document.getElementById('btn-reset-discovery').style.display = 'none';
    document.getElementById('chat-container').innerHTML = '';
    triggerOpeningMessage();
  }

  // ── Send button and Enter key ──────────────────────────────────────────────
  document.getElementById('send-btn').addEventListener('click', () => {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    input.value = '';
    sendMessage(text);
  });

  document.getElementById('message-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('send-btn').click();
    }
  });

  // ── Opening message ────────────────────────────────────────────────────────
  async function triggerOpeningMessage() {
    const msgEs = `¿Qué tipo de juego estás buscando para esta noche? Dime cuántos jugadores son, cuánto tiempo tienen, o qué mecánicas les gustan.`;
    const msgEn = `What kind of game are you looking for tonight? Tell me how many players, how much time you have, or what mechanics you enjoy.`;
    addMessage('assistant', currentLanguage === 'en' ? msgEn : msgEs);
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  (async () => {
    const count = await loadGames();
    triggerOpeningMessage();
  })();
</script>

</body>
</html>
