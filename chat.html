<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — My Board Games</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a2e;
      color: #fff;
      flex-shrink: 0;
    }

    header a { color: #aac; text-decoration: none; font-size: 14px; }
    header a:hover { color: #fff; }
    header h1 { font-size: 18px; font-weight: 600; }

    .lang-toggle { display: flex; gap: 4px; }
    .lang-toggle button {
      background: transparent;
      border: 1px solid #555;
      color: #aac;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .lang-toggle button.active {
      background: #4a4a8a;
      border-color: #4a4a8a;
      color: #fff;
    }

    .mode-bar {
      padding: 8px 16px;
      background: #e8e8f0;
      font-size: 13px;
      color: #555;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 15px;
    }
    .message.user {
      align-self: flex-end;
      background: #4a4a8a;
      color: #fff;
    }
    .message.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #ddd;
    }
    .message.error {
      align-self: flex-start;
      background: #fee;
      border: 1px solid #fcc;
      color: #900;
    }

    .message h1, .message h2, .message h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      margin-top: 8px;
    }
    .message ul { padding-left: 20px; margin: 4px 0; }
    .message li { margin: 2px 0; }
    .message code {
      background: #f0f0f0;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 13px;
    }
    .message.user code { background: rgba(255,255,255,0.2); }

    .message .table-wrap { overflow-x: auto; margin: 8px 0; }
    .message table { border-collapse: collapse; width: 100%; font-size: 14px; }
    .message th, .message td {
      border: 1px solid #ddd;
      padding: 6px 10px;
      text-align: left;
    }
    .message th { background: #f0f0f8; font-weight: 600; }
    .message tr:nth-child(even) td { background: #f9f9f9; }

    .cursor { display: inline-block; animation: blink 0.8s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .status-label { color: #777; font-style: italic; }
    .stall-note { color: #999; font-size: 13px; margin-top: 4px; font-style: italic; }

    .game-selector-bar {
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .game-selector-bar label { font-size: 13px; color: #555; white-space: nowrap; }
    .game-selector-bar select {
      flex: 1;
      min-width: 150px;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    #btn-reset-discovery {
      background: none;
      border: none;
      color: #4a4a8a;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      white-space: nowrap;
    }

    .input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
    }
    #message-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      resize: none;
      height: 42px;
      font-family: inherit;
    }
    #message-input:focus { outline: none; border-color: #4a4a8a; }
    #send-btn {
      padding: 8px 18px;
      background: #4a4a8a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <a href="/">← Mi colección</a>
  <h1>Chat</h1>
  <div class="lang-toggle">
    <button id="btn-es" class="active" onclick="setLanguage('es')">ES</button>
    <button id="btn-en" onclick="setLanguage('en')">EN</button>
  </div>
</header>

<div class="mode-bar" id="mode-bar">Modo: Descubrimiento de juego</div>

<div class="chat-container" id="chat-container"></div>

<div class="game-selector-bar">
  <label for="game-select">Juego de la noche:</label>
  <select id="game-select">
    <option value="">Seleccionar juego</option>
  </select>
  <div id="expansion-checkboxes" style="display:none"></div>
  <button id="btn-start-deepdive" style="display:none">Empezar</button>
  <button id="btn-reset-discovery" style="display:none" onclick="resetToDiscovery()">
    Volver a descubrimiento
  </button>
</div>

<div class="input-bar">
  <textarea
    id="message-input"
    placeholder="Escribe una pregunta..."
    rows="1"
  ></textarea>
  <button id="send-btn">Enviar</button>
</div>

<script>
  const WORKER_URL = ''; // empty = same origin (production via Cloudflare route)

  // ── State ──────────────────────────────────────────────────────────────────
  let currentLanguage = 'es';
  let currentMode = 'discovery';
  let currentGame = null;
  let currentGameName = null;
  let currentExpansions = [];
  let allGames = [];
  let history = [];
  let streaming = false;

  const STATUS_LABELS = {
    es: {
      thinking:  '💭 Pensando...',
      searching: '🔍 Buscando en BoardGameGeek...',
      details:   '📖 Consultando detalles del juego...',
      forum:     '💬 Revisando foros de BoardGameGeek...',
      writing:   '✍️ Escribiendo respuesta...',
    },
    en: {
      thinking:  '💭 Thinking...',
      searching: '🔍 Searching BoardGameGeek...',
      details:   '📖 Looking up game details...',
      forum:     '💬 Checking BoardGameGeek forums...',
      writing:   '✍️ Writing the answer...',
    },
  };

  // ── Language toggle ────────────────────────────────────────────────────────
  function setLanguage(lang) {
    currentLanguage = lang;
    document.getElementById('btn-es').classList.toggle('active', lang === 'es');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  }

  // ── Markdown renderer ──────────────────────────────────────────────────────
  function renderMarkdown(text) {
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/((?:<li>[^\n]*\n?)+)/g, '<ul>$1</ul>');
    // Tables
    html = html.replace(
      /^\|(.*)\|\n\|[-:\s|]+\|\n((?:\|.*\|\n?)*)/gm,
      function(match, headerRow, bodyRows) {
        const headers = headerRow.split('|').map(h => h.trim()).filter(h => h !== '');
        const rows = bodyRows.trim().split('\n').filter(r => r.trim());
        let t = '<div class="table-wrap"><table><thead><tr>';
        headers.forEach(h => { t += `<th>${h}</th>`; });
        t += '</tr></thead><tbody>';
        rows.forEach(row => {
          const cells = row.replace(/^\||\|$/g, '').split('|').map(c => c.trim());
          t += '<tr>';
          cells.forEach(c => { t += `<td>${c}</td>`; });
          t += '</tr>';
        });
        t += '</tbody></table></div>';
        return t;
      }
    );
    html = html.replace(/\n\n+/g, '</p><p>');
    html = '<p>' + html + '</p>';
    html = html.replace(/<p>(<[huld])/g, '$1');
    html = html.replace(/(<\/[huld][^>]*>)<\/p>/g, '$1');
    html = html.replace(/<p><\/p>/g, '');
    return html;
  }

  // ── Chat DOM helpers ───────────────────────────────────────────────────────
  function addMessage(role, htmlContent) {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = htmlContent;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function addStreamingMessage() {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.innerHTML = `<span class="status-label">${STATUS_LABELS[currentLanguage].thinking}</span>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  // ── Load games into selector ───────────────────────────────────────────────
  function gameLabel(g) {
    return g.edition ? `${g.name} (${g.edition})` : g.name;
  }

  async function loadGames() {
    try {
      const res = await fetch(`${WORKER_URL}/api/games`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const games = await res.json();
      allGames = games;
      const select = document.getElementById('game-select');
      games
        .filter((g) => !g.base_game_slug)
        .forEach((g) => {
          const opt = document.createElement('option');
          opt.value = g.slug;
          opt.textContent = gameLabel(g);
          select.appendChild(opt);
        });
      return games.length;
    } catch (e) {
      addMessage('error', 'No se pudo cargar la lista de juegos.');
      document.getElementById('game-select').disabled = true;
      return 0;
    }
  }

  // ── SSE chat request ───────────────────────────────────────────────────────
  async function sendMessage(userText) {
    if (streaming || !userText.trim()) return;

    streaming = true;
    document.getElementById('send-btn').disabled = true;
    document.getElementById('message-input').disabled = true;

    addMessage('user', userText.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'));

    const streamDiv = addStreamingMessage();
    let fullText = '';
    let lastEventTime = Date.now();

    const stallInterval = setInterval(() => {
      if (fullText !== '') return;
      const elapsed = Math.floor((Date.now() - lastEventTime) / 1000);
      if (elapsed < 8) return;
      const label = currentLanguage === 'en'
        ? `This is taking longer than usual (${elapsed}s)...`
        : `Esto está tardando más de lo usual (${elapsed}s)...`;
      let stallEl = streamDiv.querySelector('.stall-note');
      if (!stallEl) {
        stallEl = document.createElement('div');
        stallEl.className = 'stall-note';
        streamDiv.appendChild(stallEl);
      }
      stallEl.textContent = label;
    }, 1000);

    try {
      const res = await fetch(`${WORKER_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: userText,
          history,
          mode: currentMode,
          game: currentGame,
          expansions: currentExpansions,
          language: currentLanguage,
        }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      let finished = false;
      while (!finished) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') {
            clearInterval(stallInterval);
            streamDiv.innerHTML = renderMarkdown(fullText);
            history.push({ role: 'user', content: userText });
            history.push({ role: 'assistant', content: fullText });
            finished = true;
            break;
          }
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) {
              clearInterval(stallInterval);
              streamDiv.className = 'message error';
              streamDiv.textContent = parsed.error;
              finished = true;
              break;
            }
            if (parsed.status) {
              lastEventTime = Date.now();
              const label = (STATUS_LABELS[currentLanguage] && STATUS_LABELS[currentLanguage][parsed.status])
                || STATUS_LABELS[currentLanguage].thinking;
              streamDiv.innerHTML = `<span class="status-label">${label}</span>`;
            }
            if (parsed.token) {
              lastEventTime = Date.now();
              fullText += parsed.token;
              streamDiv.innerHTML = renderMarkdown(fullText) + '<span class="cursor">▋</span>';
              document.getElementById('chat-container').scrollTop =
                document.getElementById('chat-container').scrollHeight;
            }
          } catch {}
        }
      }
    } catch (e) {
      clearInterval(stallInterval);
      streamDiv.className = 'message error';
      streamDiv.innerHTML = 'Error al conectar con el asistente. Intenta de nuevo.';
    }

    clearInterval(stallInterval);
    streaming = false;
    document.getElementById('send-btn').disabled = false;
    const input = document.getElementById('message-input');
    input.disabled = false;
    input.focus();
  }

  // ── Game night selection ───────────────────────────────────────────────────
  function setAwaitingCombo(awaiting) {
    const input = document.getElementById('message-input');
    input.disabled = awaiting;
    document.getElementById('send-btn').disabled = awaiting;
    input.placeholder = awaiting
      ? 'Marca las expansiones que quieras y haz clic en "Empezar"...'
      : 'Escribe una pregunta...';
  }

  function startDeepDive(baseSlug, baseLabel, expansionSlugs, expansionLabels) {
    currentMode = 'deep_dive';
    currentGame = baseSlug;
    currentExpansions = expansionSlugs;
    currentGameName = [baseLabel, ...expansionLabels].join(' + ');
    history = [];
    setAwaitingCombo(false);

    const safeName = currentGameName.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    document.getElementById('mode-bar').textContent = `Modo: ${currentGameName}`;
    document.getElementById('btn-reset-discovery').style.display = 'inline';
    document.getElementById('chat-container').innerHTML = '';

    const openingEs = `Listo para responder preguntas sobre ${safeName}. Tengo acceso a las reglas, setup y guía de enseñanza. ¿Qué necesitas saber?`;
    const openingEn = `Ready to answer questions about ${safeName}. I have access to the rules, setup, and teaching guide. What do you need to know?`;
    addMessage('assistant', currentLanguage === 'en' ? openingEn : openingEs);
  }

  document.getElementById('game-select').addEventListener('change', function () {
    const slug = this.value;
    const checkboxContainer = document.getElementById('expansion-checkboxes');
    const startButton = document.getElementById('btn-start-deepdive');
    checkboxContainer.innerHTML = '';

    if (!slug) {
      checkboxContainer.style.display = 'none';
      startButton.style.display = 'none';
      setAwaitingCombo(false);
      return;
    }

    const game = allGames.find((g) => g.slug === slug);
    const label = this.options[this.selectedIndex].textContent;
    const expansions = (game && game.expansions) || [];

    if (expansions.length === 0) {
      checkboxContainer.style.display = 'none';
      startButton.style.display = 'none';
      startDeepDive(slug, label, [], []);
      return;
    }

    expansions.forEach((exp) => {
      const wrapper = document.createElement('label');
      wrapper.className = 'expansion-checkbox';
      const input = document.createElement('input');
      input.type = 'checkbox';
      input.value = exp.slug;
      input.dataset.label = gameLabel(exp);
      wrapper.appendChild(input);
      wrapper.appendChild(document.createTextNode(' ' + gameLabel(exp)));
      checkboxContainer.appendChild(wrapper);
    });
    checkboxContainer.style.display = 'block';
    startButton.style.display = 'inline';
    setAwaitingCombo(true);
  });

  document.getElementById('btn-start-deepdive').addEventListener('click', function () {
    const select = document.getElementById('game-select');
    const slug = select.value;
    if (!slug) return;
    const label = select.options[select.selectedIndex].textContent;

    const checked = Array.from(
      document.querySelectorAll('#expansion-checkboxes input[type="checkbox"]:checked')
    );
    const expansionSlugs = checked.map((c) => c.value);
    const expansionLabels = checked.map((c) => c.dataset.label);

    startDeepDive(slug, label, expansionSlugs, expansionLabels);
  });

  function resetToDiscovery() {
    currentMode = 'discovery';
    currentGame = null;
    currentGameName = null;
    currentExpansions = [];
    history = [];
    document.getElementById('game-select').value = '';
    document.getElementById('expansion-checkboxes').innerHTML = '';
    document.getElementById('expansion-checkboxes').style.display = 'none';
    document.getElementById('btn-start-deepdive').style.display = 'none';
    document.getElementById('mode-bar').textContent = 'Modo: Descubrimiento de juego';
    document.getElementById('btn-reset-discovery').style.display = 'none';
    document.getElementById('chat-container').innerHTML = '';
    setAwaitingCombo(false);
    triggerOpeningMessage();
  }

  // ── Send button and Enter key ──────────────────────────────────────────────
  document.getElementById('send-btn').addEventListener('click', () => {
    const input = document.getElementById('message-input');
    const text = input.value.trim();
    input.value = '';
    sendMessage(text);
  });

  document.getElementById('message-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.getElementById('send-btn').click();
    }
  });

  // ── Opening message ────────────────────────────────────────────────────────
  async function triggerOpeningMessage() {
    const msgEs = `¿Qué tipo de juego estás buscando para esta noche? Dime cuántos jugadores son, cuánto tiempo tienen, o qué mecánicas les gustan.`;
    const msgEn = `What kind of game are you looking for tonight? Tell me how many players, how much time you have, or what mechanics you enjoy.`;
    addMessage('assistant', currentLanguage === 'en' ? msgEn : msgEs);
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  (async () => {
    const count = await loadGames();
    triggerOpeningMessage();
  })();
</script>

</body>
</html>
