<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — My Board Games</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a2e;
      color: #fff;
      flex-shrink: 0;
    }

    header a { color: #aac; text-decoration: none; font-size: 14px; }
    header a:hover { color: #fff; }
    header h1 { font-size: 18px; font-weight: 600; }

    .lang-toggle { display: flex; gap: 4px; }
    .lang-toggle button {
      background: transparent;
      border: 1px solid #555;
      color: #aac;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .lang-toggle button.active {
      background: #4a4a8a;
      border-color: #4a4a8a;
      color: #fff;
    }

    .mode-bar {
      padding: 8px 16px;
      background: #e8e8f0;
      font-size: 13px;
      color: #555;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 15px;
    }
    .message.user {
      align-self: flex-end;
      background: #4a4a8a;
      color: #fff;
    }
    .message.assistant {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #ddd;
    }
    .message.error {
      align-self: flex-start;
      background: #fee;
      border: 1px solid #fcc;
      color: #900;
    }

    .message h1, .message h2, .message h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      margin-top: 8px;
    }
    .message ul { padding-left: 20px; margin: 4px 0; }
    .message li { margin: 2px 0; }
    .message code {
      background: #f0f0f0;
      padding: 1px 4px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 13px;
    }
    .message.user code { background: rgba(255,255,255,0.2); }

    .cursor { display: inline-block; animation: blink 0.8s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .game-selector-bar {
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .game-selector-bar label { font-size: 13px; color: #555; white-space: nowrap; }
    .game-selector-bar select {
      flex: 1;
      min-width: 150px;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    #btn-reset-discovery {
      background: none;
      border: none;
      color: #4a4a8a;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      white-space: nowrap;
    }

    .input-bar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
      flex-shrink: 0;
    }
    #message-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      resize: none;
      height: 42px;
      font-family: inherit;
    }
    #message-input:focus { outline: none; border-color: #4a4a8a; }
    #send-btn {
      padding: 8px 18px;
      background: #4a4a8a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    #send-btn:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <a href="/">← Mi colección</a>
  <h1>Chat</h1>
  <div class="lang-toggle">
    <button id="btn-es" class="active" onclick="setLanguage('es')">ES</button>
    <button id="btn-en" onclick="setLanguage('en')">EN</button>
  </div>
</header>

<div class="mode-bar" id="mode-bar">Modo: Descubrimiento de juego</div>

<div class="chat-container" id="chat-container"></div>

<div class="game-selector-bar">
  <label for="game-select">Juego de la noche:</label>
  <select id="game-select">
    <option value="">Seleccionar juego</option>
  </select>
  <button id="btn-reset-discovery" style="display:none" onclick="resetToDiscovery()">
    Volver a descubrimiento
  </button>
</div>

<div class="input-bar">
  <textarea
    id="message-input"
    placeholder="Escribe una pregunta..."
    rows="1"
  ></textarea>
  <button id="send-btn">Enviar</button>
</div>

<script>
  // Language state
  window.currentLanguage = 'es';

  function setLanguage(lang) {
    window.currentLanguage = lang;
    document.getElementById('btn-es').classList.toggle('active', lang === 'es');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  }

  function resetToDiscovery() {
    // full implementation comes in Task 8
  }

  // Placeholder: full JS will be added in Task 8
</script>

</body>
</html>
